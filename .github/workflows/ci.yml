name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[all]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Import check — all modules
        run: |
          python -c "
          from jobradar.config import load_config
          from jobradar.models.job import RawJob, ScoredJob, SearchQuery, ScoreBreakdown
          from jobradar.models.candidate import CandidateProfile
          from jobradar.storage.models import Job, ScoredJobRecord, PipelineRun
          from jobradar.storage.db import init_db, get_session
          from jobradar.sources.base import JobSource
          from jobradar.sources.normalizer import normalise, dedup
          from jobradar.sources.query_builder import build_queries
          from jobradar.sources.registry import build_registry
          from jobradar.sources.adapters.arbeitsagentur import ArbeitsagenturSource
          from jobradar.sources.adapters.stepstone import StepstoneSource
          from jobradar.sources.adapters.xing import XingSource
          from jobradar.sources.adapters.jobspy_adapter import JobSpySource
          from jobradar.sources.adapters.zhilian import ZhilianSource
          from jobradar.sources.adapters.lagou import LagouSource
          from jobradar.sources.adapters.bosszhipin import BossZhipinSource
          from jobradar.scoring.hard_filter import apply as hard_filter
          from jobradar.scoring.scorer import score_jobs
          from jobradar.pipeline import JobRadarPipeline
          from jobradar.api.main import create_app
          from jobradar.interfaces.cli import app as cli_app
          from jobradar.interfaces.skill import run_skill, _detect_api_key, _is_configured
          print('All imports OK')
          "

      - name: Lint
        run: ruff check src/ --select E,F,W --ignore E501 || true

      - name: DB init + auto-mkdir test
        run: |
          python -c "
          import tempfile
          from pathlib import Path
          from sqlmodel import select, func
          from jobradar.storage.db import init_db, get_session
          from jobradar.storage.models import Job
          with tempfile.TemporaryDirectory() as d:
              db = Path(d) / 'sub' / 'test.db'
              init_db(db)
              with next(get_session(db)) as s:
                  assert s.exec(select(func.count(Job.id))).one() == 0
          print('DB init OK')
          "

      - name: Normaliser + dedup test
        run: |
          python -c "
          from jobradar.models.job import RawJob
          from jobradar.sources.normalizer import normalise, dedup
          jobs = [
              RawJob(title='A', company='X', url='https://ex.com/1', source='test'),
              RawJob(title='B', company='Y', url='https://ex.com/2', source='test'),
              RawJob(title='A', company='X', url='https://ex.com/1', source='test'),
          ]
          result = dedup([normalise(j) for j in jobs])
          assert len(result) == 2, f'Expected 2, got {len(result)}'
          print('Normaliser + dedup OK')
          "

      - name: Hard filter test
        run: |
          python -c "
          from jobradar.config import AppConfig
          from jobradar.models.job import RawJob
          from jobradar.scoring.hard_filter import apply as hard_filter
          cfg = AppConfig()
          jobs = [
              RawJob(id='j1', title='AI Engineer', company='ACME', url='https://x.com/1', source='test'),
              RawJob(id='j2', title='Praktikum Data', company='Corp', url='https://x.com/2', source='test'),
              RawJob(id='j3', title='ML Engineer', company='Good', url='https://x.com/3', source='test'),
          ]
          kept, dropped = hard_filter(jobs, cfg)
          assert dropped == 1, f'Expected 1 dropped (Praktikum), got {dropped}'
          assert len(kept) == 2
          print(f'Hard filter OK: {len(kept)} kept, {dropped} dropped')
          "

      - name: Query builder — max_results propagation test
        run: |
          python -c "
          from jobradar.config import AppConfig
          from jobradar.models.candidate import CandidateProfile
          from jobradar.sources.query_builder import build_queries
          profile = CandidateProfile()
          profile.target.roles = ['AI Engineer']
          profile.target.locations = ['Berlin']
          cfg = AppConfig()
          queries = build_queries(profile, cfg, max_results_override=3)
          missing = [q for q in queries if not q.extra.get('max_results')]
          assert not missing, f'Queries missing max_results: {[q.source for q in missing]}'
          max_r = set(q.extra.get('max_results') for q in queries)
          assert max_r == {3}, f'Expected only 3, got {max_r}'
          print(f'Query builder OK: {len(queries)} queries, all capped at 3')
          "

      - name: Skill setup tool test
        run: |
          python -c "
          import json, tempfile, os
          from pathlib import Path
          # Simulate a fresh environment with an API key
          with tempfile.TemporaryDirectory() as d:
              os.environ['JOBRADAR_DIR'] = d
              os.environ['ARK_API_KEY'] = 'test_key_ci'
              from jobradar.interfaces.skill import run_skill, _detect_api_key
              # Test key detection
              var, base_url, model = _detect_api_key()
              assert var == 'ARK_API_KEY', f'Expected ARK_API_KEY, got {var}'
              # Test setup with cv_content
              r = json.loads(run_skill('setup', json.dumps({
                  'cv_content': '# Test\nSoftware Engineer.',
                  'locations': 'Berlin,Remote',
              })))
              assert r['status'] in ('setup_complete', 'setup_partial')
              assert 'project_dir' in r
              print(f'Skill setup tool OK: status={r[\"status\"]}')
          "

      - name: dry-run pipeline test
        run: |
          python -c "
          import tempfile
          from pathlib import Path
          from jobradar.config import AppConfig, CandidateConfig, ServerConfig
          from jobradar.pipeline import JobRadarPipeline
          with tempfile.TemporaryDirectory() as d:
              cv = Path(d) / 'cv.md'
              cv.write_text('# Test\nSoftware Engineer with Python skills.')
              cfg = AppConfig()
              cfg.candidate = CandidateConfig(cv_path=str(cv))
              cfg.server = ServerConfig(
                  db_path=str(Path(d) / 'data' / 'test.db'),
                  cache_dir=str(Path(d) / 'cache'),
              )
              cfg._config_dir = Path(d)
              result = JobRadarPipeline(cfg).run(mode='dry-run')
              assert result.status == 'done', result
          print('dry-run pipeline OK')
          "

      - name: Arbeitsagentur connectivity test (advisory — failure is non-blocking)
        # This test is informational only. Arbeitsagentur blocks CI IPs intermittently.
        # We test that the adapter initialises and handles errors gracefully, not that
        # it returns results (which depends on external network access).
        run: |
          python -c "
          import logging
          from datetime import datetime, timedelta, timezone
          from jobradar.models.job import SearchQuery
          from jobradar.sources.adapters.arbeitsagentur import ArbeitsagenturSource
          logging.basicConfig(level=logging.ERROR)
          src = ArbeitsagenturSource()
          since = datetime.now(timezone.utc) - timedelta(days=14)
          q = SearchQuery(keyword='Software Engineer', location='Berlin',
                          source='arbeitsagentur', extra={'max_results': 3})
          try:
              jobs = src.fetch([q], since)
              print(f'Arbeitsagentur: {len(jobs)} jobs (network available)')
          except Exception as e:
              # Adapter should never raise — it logs and returns []
              print(f'WARN: unexpected exception (adapter should catch this): {e}')
          print('Arbeitsagentur adapter graceful-error test OK')
          "
        continue-on-error: true

      - name: CLI smoke test
        run: |
          jobradar --help
          jobradar status
