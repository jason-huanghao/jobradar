# JobRadar — configuration
# Only  candidate.cv  is required. Everything else has sensible defaults.
#
# CV accepts: local file path (.md / .pdf / .docx / .txt), URL, or leave blank
# to be prompted on first run.
#
# Examples:
#   cv: ./cv_current.md
#   cv: https://github.com/you/repo/blob/main/cv.md
#   cv: /Users/you/Documents/resume.pdf

candidate:
  cv: ""   # ← fill this in, or run: jobradar update --cv <path-or-url>

# Identity — owns your profile, scores, and per-user LLM settings.
# Required before fetch/score/report/apply. Set here, or pass --user on the CLI.
user:
  email: ""   # e.g. you@example.com

# ── Optional overrides (defaults shown) ───────────────────────────────────────

# search:
#   locations: []           # empty = worldwide; e.g. [Berlin, Hamburg, Remote]
#   max_results: 20         # jobs per source per query
#   max_days_old: 14        # posting TTL — older postings count as expired
#   staleness_days: 7       # not re-seen in N days -> expired (hidden by `sweep`)
#   enrich_descriptions: true  # fetch detail pages to fill missing job descriptions
#   enrich_max: 40          # cap detail fetches per run (they are slow)
#   exclude_keywords:       # drop titles matching these (case-insensitive)
#     - Praktikum
#     - Werkstudent
#     - Ausbildung
#     - internship

# reliability:              # per-source fetch resilience (used by the source registry)
#   max_attempts: 2         # total tries per source on transient SourceError
#   retry_base_delay: 0.5   # seconds; backoff = base * 2**(attempt-1)

# scoring:
#   min_score: 6.0            # minimum score to appear in digest/report
#   auto_apply_min_score: 7.5 # auto-apply above this (requires jobradar[apply])
#   max_desc_chars: 2000      # per-job description budget sent to the LLM scorer

# sources:
#   # EU sources are ON by default (no extra setup needed)
#   # CN sources require:  pip install "jobradar[cn]"  + cookie/network setup
#   bosszhipin:
#     enabled: false   # set BOSSZHIPIN_COOKIES in .env
#   lagou:
#     enabled: false   # requires mainland China network
#   zhilian:
#     enabled: false   # requires mainland China network

# report:
#   auto_open: true    # open HTML report in browser after generation
#   # github_pages_repo: jason-huanghao/jobradar  # enable via gh-cli skill

# server:
#   port: 7842         # skill server port
